services:
  postgres:
    image: postgres:16
    container_name: projectpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectpilot
      POSTGRES_USER: projectpilot_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
